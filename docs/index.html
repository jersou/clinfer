<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Clinfer</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Description">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    >
    <link rel="stylesheet" href="docsify/docsify-darklight-theme.min.css">

    <style>
      .markdown-section pre,
      .markdown-section pre code,
      .markdown-section code {
        font-size: 16px !important;
        line-height: 1.6 !important;
        font-family: "Roboto Mono", Monaco, courier, monospace !important;
      }
      .markdown-section p code,
      .markdown-section li code {
        font-size: 16px !important;
        padding: 2px 6px !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        loadSidebar: true,
        subMaxLevel: 2,
        auto2top: true,
        name: "clinfer",
        repo: "https://github.com/jersou/clinfer/",
        darklightTheme: {
          siteFont: "Source Sans Pro, Helvetica Neue, Arial, sans-serif",
          codeFontFamily: "Roboto Mono, Monaco, courier, monospace",
          dark: {
            accent: "#42b983",
            tooglerBgColor: "#ffffff",
            tooglerColor: "#1f2937",
          },
          light: {
            accent: "#42b983",
            tooglerBgColor: "#1f2937",
            tooglerColor: "#ffffff",
          },
        },
        pagination: {
          crossChapter: true,
          crossChapterText: true,
        },
      };
    </script>
    <!-- Docsify v4 -->
    <script src="docsify/docsify@4.js"></script>
    <script src="docsify/search.min.js"></script>
    <script src="docsify/docsify-darklight-theme.min.js"></script>
    <script src="docsify/docsify-copy-code.min.js"></script>
    <script src="docsify/prism-typescript.min.js"></script>
    <!--    <script src="docsify/prism-bash.min.js"></script>-->
    <script src="docsify/prism-shell-session.min.js"></script>
    <script src="docsify/docsify-pagination.min.js"></script>
  </body>
</html>
